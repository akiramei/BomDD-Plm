# ECO-001/ECO-002 (S-20/S-24) path acceptance-form fixture.
# repo name (single-repo run) = directory name "eco001-paths".
# source_refs are kind: path (R-004 on non-existence). trace_links are id-or-path.
requirements:
  - id: REQ-001
    name: path acceptance forms
    source_refs:
      - testdir                       # single-segment dir, exists  -> resolve (form 2)
      - single.md                     # single-segment file, exists -> resolve (form 2)
      - sub/nested                    # multi-segment dir, exists    -> resolve (form 2)
      - eco001-paths/testdir          # canonical form, exists       -> resolve (form 1)
      - eco001-paths:single.md        # repo: form, exists           -> resolve (form 3)
      - nosuchrepo:single.md          # repo: form, repo absent      -> X-XREPO-001 skip (rev3/CH-3; no fallback to form 2)
      - eco001-paths:no-such-file.md  # repo: form, repo present, path absent -> R-004 (rev3: unchanged)
      - nope/missing.md               # truly absent                 -> UNRESOLVED
    trace_links:
      - trace_id: TL-001
        from: REQ-001
        to: testdir                   # id-or-path ②: repo-relative path, exists -> resolve (no R-003/R-041)
