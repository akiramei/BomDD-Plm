  product_eco_candidates:            # 未起票の製品 ECO 候補
    - "ECO-002 候補: repo: 形パス参照の repo 不在は R-004 でなく X-XREPO 系 skip(info)へ — ID 参照の cross_repo(候補リポ不在= skip)との一貫性。ViewPrism2 pre-commit 常駐(単一リポ実行)で7件の正当な cross-repo 参照が error になった非対称の実測(2026-07-03。当面の運用= workspace 宣言で回避)"
    - "軽微債務: resolve/model.ts(buildNodes)と rules/evaluate.ts(emitOrphans)の dedup キー区切りに生の NUL バイト(U+0000)がソース直埋め — 機能は同値だが ripgrep 系ツールが両ファイルをバイナリ判定して検索から脱落する実害(2026-07-03 ECO-003 起票調査中に発見)。是正はエスケープ表記 \\u0000 への置換のみ(1文字×2ファイル)。単独 ECO は過剰 — 次の src 変更 ECO に便乗が適切 → **解消(ECO-004・2026-07-04)**"
