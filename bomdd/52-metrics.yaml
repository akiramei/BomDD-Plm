    - "台帳債務候補: M-BOM の写像被覆ギャップ — test/(fixture 含む)と dist/ を所有する unit が無い(2026-07-04・影響分析遡及採点ツール impact-retrospective.py の予備観測で検出。ViewPrism2 のオラクル dir 非所有= ECO-035 と同型の 2 例目)。治具は製品と同格の原則の台帳反映。次回 32-mbom 改訂時に所有 unit を宣言(単独 ECO は過剰)"

