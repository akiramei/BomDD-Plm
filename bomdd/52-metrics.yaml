    - { rev: rev0, factory: factory-02(sonnet), score: "13/25", attribution: "同 BOM 系統 4/4 再現(欠陥は BOM に宿る) / 工場能力は逆転分布(parse優・family劣)" }
    - { rev: rev1, factory: "factory-03(混成 opus→sonnet)", score: "25/25(残渣ゼロ)", note: "1改訂で0到達。修正はBOMに宿る" }

