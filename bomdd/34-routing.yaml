bomdd:
  product: BomDD-Plm
  experiment: plm-v0
  layer: Routing

routing:
  id: ROUTING-PLM-V0-001
  purpose: bomdd-lint+viewer の初回製造(単一工場 fresh・収束予算2ループ)
  factory_isolation: 製造装置には製造パッケージ(20/30-35/40+同梱 ref-v0 スナップショット+UI-CAD 一式)のみ供与。設計対話・41/42・oracle/ 配下・他工場成果は非開示
  cheat_report: BOM/K-BOM/Control Plan から導けなかった判断は実装を止めず全件 cheat-log 形式で報告
  steps:
    - { order: 1, id: ROUTE-READ,        name: パッケージ読解と実装計画, input: [bomdd/20-spec.md, bomdd/30-35], output: [実装計画], gate: blocker UQ ゼロ・矛盾発見時は blocked 宣言して残りを続行 }
    - { order: 2, id: ROUTE-M-INGEST,    name: 発見+パース製造,          consumes_refs: [M-CORE-INGEST-001],  acceptance_refs: [CP-READONLY-001, CP-DISCOVER-002, CP-PARSE-003] }
    - { order: 3, id: ROUTE-M-GRAPH,     name: スキーマ+解決製造,        consumes_refs: [M-CORE-GRAPH-002],   acceptance_refs: [CP-SCHEMA-004, CP-RESOLVE-005, CP-WORKSPACE-006] }
    - { order: 4, id: ROUTE-M-RULES,     name: 規則+ゲート+抑制製造,     consumes_refs: [M-CORE-RULES-003],   acceptance_refs: [CP-LINT-007, CP-GATE-008, CP-SUPPRESS-009] }
    - { order: 5, id: ROUTE-M-OUTPUT,    name: 正規シリアライザ+契約スキーマ製造, consumes_refs: [M-CORE-OUTPUT-004], acceptance_refs: [CP-OUTPUT-010] }
    - { order: 6, id: ROUTE-M-CLI,       name: CLI 製造,                  consumes_refs: [M-CLI-005],          acceptance_refs: [CP-CLI-011] }
    - { order: 7, id: ROUTE-M-VIEWERGEN, name: viewer 生成機構製造,       consumes_refs: [M-VIEWER-GEN-006],   acceptance_refs: [CP-VIEWER-012] }
    - { order: 8, id: ROUTE-M-VIEWERUI,  name: 4ビュー UI 製造(design parts 適用), consumes_refs: [M-VIEWER-UI-007, K-DESIGN-PLM], acceptance_refs: [CP-VIEW-FINDINGS-013, CP-VIEW-GRAPH-014, CP-VIEW-TRACE-015, CP-VIEW-LEDGER-016, CP-DESIGN-SYSTEM-019] }
    - { order: 9, id: ROUTE-SELF-ACCEPT, name: 自己受入(赤= stop/report。納品しない), consumes_refs: [M-HARNESS-008], command: "npm run build && node --test", note: "unit 全緑+L1 スモーク(ミニ fixture→CLI→plm-view.html 生成)+治具セルフテスト" }
    - { order: 10, id: ROUTE-DELIVER,    name: 納品(成果物+cheat-log+as-built 素材), output: [packages/, schemas/, test/, cheat-log 報告] }
