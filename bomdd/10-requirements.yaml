  # ============================================================
  # F. Viewer(read-only)
  # ============================================================

  - id: REQ-018
    statement: >-
      viewer は core の出力(診断 JSON+グラフ JSON)のみを入力とし、対象リポへ直接アクセスしない。
      ローカル環境で閲覧でき、閲覧操作がいかなる書き込みも発生させない。
    rationale: >-
      DEC-0002 の 3 分割(viewer は消費者)の要求面。入力を JSON に限定すれば viewer は
      リポアクセス権も要らず read-only が構造保証される。形態(静的生成 vs ローカルサーバ)は
      20-spec で確定(UQ-004。推奨=静的生成)。深さ L2(viewer 生成物がリポ非参照で完結)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/65-decision-register.yaml]
    acceptance_intent: { depth_hint: L2, tolerance_hint: "JSON 入力のみで全ビュー描画可(リポ不在でも動く)", approver_hint: automated }
    counterexamples:
      - ビューがモック HTML を直接読み に行き、リポ無しで開けない(リンクは可・読込は不可)
    unresolved_questions:
      - question_id: UQ-REQ-018-001
        question: 静的サイト生成 vs ローカルサーバ(charter UQ-004 の継承。spec で確定)
        severity: non-blocker

  - id: REQ-019
    statement: >-
      リント所見ビュー — severity・gate・rule・ファイルでフィルタできる所見一覧と件数サマリを表示する。
      抑制済み所見(REQ-015)は理由付きで区別表示する。
    rationale: >-
      人間が生 YAML でなく所見を読む、が製品目的(SRC-02)。表示要素集合は 20-spec の表示契約
      (display contract)で確定し、検査は表示契約行の存在+意味一致(深さ G は視覚全体、
      要素存在は L2 DOM 検査可)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "UI-CAD(Phase 2-3 で作成するモック+UI-IR)"
    priority: must
    source_refs: [bomdd/65-decision-register.yaml]
    acceptance_intent: { depth_hint: G, tolerance_hint: "表示契約の required elements 全数存在+golden 承認", approver_hint: akira }
    counterexamples:
      - 所見1万件で一覧が固まる(仮想化 or ページング — ViewPrism2 REQ-041 と同型の罠)
    unresolved_questions: []

  - id: REQ-020
    statement: >-
      品目グラフビュー — 品目(E/M/K/CP/SB 他)をノード、参照をエッジとして可視化し、
      lifecycle_state(superseded/retired の灰色化等)と lineage を表現する。R-040 違反
      (superseded への active 参照)を強調表示する。
    rationale: >-
      「人間が読む対象がソースから YAML に移っただけ」問題への回答の中核。Active Graph Integrity
      (BomDD 直近の手動運用)を目視可能にする。視覚は G(golden+akira)、グラフの内容正当性は
      L2(グラフ JSON との突合)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "UI-CAD(Phase 2-3 で作成)"
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: G, tolerance_hint: "表示ノード/エッジ集合=グラフ JSON と一致(L2)+golden 承認", approver_hint: akira }
    counterexamples:
      - ViewPrism2 規模(ID 数千)で描画が破綻 → 初期表示は近傍(選択品目から距離 N)に限定する等の contentVariance を UI-IR に明記
    unresolved_questions: []

  - id: REQ-021
    statement: >-
      トレースマトリクスビュー — REQ→E→M→CP→証跡(As-Built TE)の被覆を行列で表示し、
      未被覆セル(R-010/011/012/050 所見に対応)を強調する。
    rationale: >-
      製造業のトレーサビリティマトリクス相当。所見(点)とマトリクス(面)は同じデータの2表示で、
      整合していること自体が検査対象(L2: マトリクスの未被覆セル集合=対応する lint 所見集合)。
      視覚は G。
    rationale_precision: ok
    classification_hint: surface
    external_source: "UI-CAD(Phase 2-3 で作成)"
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: G, tolerance_hint: "未被覆セル集合と lint 所見の完全一致(L2)+golden 承認", approver_hint: akira }
    counterexamples:
      - lifecycle=draft の品目を未被覆と赤表示してノイズ化(ゲート概念の表示への反映漏れ)
    unresolved_questions: []

  - id: REQ-022
    statement: >-
      台帳ビュー — ECO 台帳(60-*)・ずる台帳(51)・裁定台帳(65)の一覧(ID・タイトル・状態・日付)を
      表示する。散文台帳(.md)からは見出しと ID のみ抽出し、全文の構造化パースはしない。
    rationale: >-
      台帳の一覧性が PLM の基本価値。散文の全文パースは旧試作の轍(壊れやすい抽出器)なので
      見出しレベルに限定する。深さ L2(フィクスチャ台帳で抽出行数・ID 一致)+G。
    rationale_precision: ok
    classification_hint: surface
    external_source: "UI-CAD(Phase 2-3 で作成)"
    priority: should
    source_refs: [bomdd/plm-intake/id-inventory-2026-07-03.md]
    acceptance_intent: { depth_hint: L2, tolerance_hint: "抽出エントリ集合の期待一致", approver_hint: automated }
    counterexamples:
