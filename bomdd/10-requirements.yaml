  - id: REQ-027
    statement: >-
      --sarif 指定時、--out に SARIF 2.1.0 準拠の sarif.json を追加生成する(既定は生成しない=既存出力不変)。
      写像は仕様 §2.9(rev3): rule→ruleId / severity→level(error/warning/note)/ 正準パス+行→location /
      抑制済み→suppressions[kind=external] / 発火規則のみ driver.rules[]。決定性は §2.9 規約に従う。
    rationale: >-
      DEC-0004 の後段(SARIF は将来の追加出力として ECO で扱う=本 ECO)。用途は GitHub code scanning /
      汎用 SARIF ビューアとの統合(CI 常設の次の一歩)。plm-diag/1 が一次契約のまま — SARIF は派生ビューで
      あり情報の追加源泉にしない。深さ unit(既知 fixture の期待 SARIF 断面一致)+スキーマ適合。
    rationale_precision: ok
    classification_hint: surface
    external_source: "SARIF 2.1.0(OASIS 標準)"
    priority: should
    source_refs: [bomdd/65-decision-register.yaml, bomdd/60-change-order-eco-002.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "results の件数・ruleId 集合・level 写像・suppressions が diagnostics と整合(exact)", approver_hint: automated }
    counterexamples:
      - SARIF 側にだけ存在する情報が生まれ二重管理に陥る(DEC-0004 違反)
      - level 写像で info を warning に格上げして CI が偽ブロック
      - suppressions を落として抑制済み所見が code scanning で再燃
    unresolved_questions: []
