  # ============================================================
  # G. 非機能・環境
  # ============================================================

  - id: REQ-024
    statement: >-
      実行環境 — Node.js LTS(v22 以上)。Windows と Linux の両方で全受入が通る。
      CRLF/LF 混在・BOM 付き UTF-8・日本語やスペースを含むパスを正しく処理する。
    rationale: >-
      開発機=Windows(実リポは CRLF 混在を実測済み)、CI=Linux 想定。行番号報告は
      改行形式に依存しないこと。深さ L2(両 OS での受入実行+エンコーディング系フィクスチャ)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "Node.js LTS リリース表 / OS ファイルシステム差(K-BOM 候補: K-NODE-PORTABILITY)"
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: L2, tolerance_hint: "Windows/Linux 両方で固定オラクル全通過", approver_hint: automated }
    counterexamples:
      - CRLF ファイルで行番号が1ずれる
      - 日本語+空白を含むパス(OneDrive のドキュメント配下等)で glob が失敗
    unresolved_questions: []

  - id: REQ-025
    statement: >-
      性能 — ViewPrism2+ViewPrismUI workspace(実測: 約50ファイル・ID数千・参照数万)に対し、
      コールドスタートで lint 完了 10 秒以内、viewer 生成 15 秒以内(ローカル SSD・Node LTS)。
    rationale: >-
      pre-commit / CI 毎コミット常駐が使われる条件(D1 対策)。基準リポと数値を固定したので
      L3 execution measurement で機械判定できる。将来の regression 検知にも同じ行を使う。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/plm-intake/id-inventory-2026-07-03.md]
    acceptance_intent: { depth_hint: L3, tolerance_hint: "lint ≤10s / viewer ≤15s(基準リポ・3回実行の中央値)", approver_hint: automated }
    counterexamples:
      - スキーマを実行時読込(REQ-006)にした結果、正規表現コンパイルが支配項になる
      - OneDrive 配下のリポでファイル I/O が桁で遅い(→ 測定条件はローカル SSD と明記済み)
    unresolved_questions:
      - question_id: UQ-REQ-025-001
        question: 数値(10s/15s)の妥当性確認。より厳しくすべきか(akira の体感基準)
        severity: non-blocker

  - id: REQ-026
    statement: >-
      所見メッセージの自己説明性 — 各所見は「何が・どこで・なぜ問題か・どの成果物を直すべきか」を
      含む。ref-v0 の rule note(是正先の指示)をメッセージに転記する。
    rationale: >-
      「人間はソースを読まない」世界では所見が一次インターフェース。是正先の指示
      (例: R-020 → UI-IR を作れ、実装を直すな)は ref-v0 に既にあるので転記で足りる。
      深さ unit(全 rule のメッセージが4要素を含むことの機械検査+文面は G2 監査)。
    rationale_precision: ok
    classification_hint: core
    priority: should
    source_refs: [bomdd/plm-intake/yaml-authoring-traps.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "全 rule メッセージに4要素(what/where/why/fix-target)", approver_hint: automated }
    counterexamples:
      - メッセージが reference not found の一言だけの所見(どの台帳を直すか不明)が量産される
    unresolved_questions: []

