    unresolved_questions: []

  - id: REQ-023
    statement: >-
      viewer の UI surface は本プロジェクト自身の UI-CAD パッケージ(モック+UI-IR+UI-BOM+trace map)
      に適合する。UI-CAD なしの surface を製造しない(R-020 を自製品へ適用)。
    rationale: >-
      charter のドッグフーディング宣言。ViewPrismUI で実証済みの経路の2周目であり、
      UI-CAD 経路自体の外部妥当性データにもなる。検査は R-020(L2)+visual gap analysis(G)。
    rationale_precision: ok
    classification_hint: surface
