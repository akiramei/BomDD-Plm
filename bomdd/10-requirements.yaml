bomdd:
  product: BomDD-Plm
  experiment: plm-v0
  layer: Requirements

# G1 成果物(2026-07-03)。典拠: method/prompts/phase1-brainstorm.md / templates/10-requirements.yaml
# 根拠精度の規律: rationale だけから検査深さ(unit/L1-L3/G)と許容差が決められること。
# trace_links は 20-spec / 30-ebom 作成時に張る(G1 時点では空)。
# 反例(counterexamples)は FMEA の種として Phase 3 へ引き継ぐ。

requirements:

  # ============================================================
  # A. 正本直読の原則(旧試作の失敗帰属への直接対策)
  # ============================================================

  - id: REQ-001
    statement: >-
      リンタ・ビューアは対象リポジトリのファイルを毎回直読し、実行間で永続状態
      (DB・キャッシュファイル・ミラー)を一切持たない。同一入力に対し同一出力を返す。
    rationale: >-
      旧試作の失敗根因1=YAML→DB コピーによる正本の二重化(SRC-02 前史)。状態を持たなければ
      鮮度管理という工程自体が存在せず、再実行=常に正本と一致が構造的に保証される。
      検査は「実行前後で環境に残るものが指定出力のみ」を確認すればよい(深さ L3・許容差ゼロ)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: L3, tolerance_hint: "実行後の残留物=指定出力のみ(temp含めゼロ)", approver_hint: automated }
    counterexamples:
      - OS の一時ディレクトリに中間ファイルを書いて消し忘れる
      - 「高速化のため」の incremental キャッシュが古い定義インデックスを返す
      - viewer がブラウザ localStorage に状態を持ち、リポ更新後も古いグラフを表示する
    unresolved_questions: []

  - id: REQ-002
    statement: >-
      対象リポジトリ配下へは一切書き込まない(内容変更ゼロ)。全ての出力(診断・グラフ・ビュー)は
      利用者が指定したリポ外の出力先にのみ生成する。
    rationale: >-
      read-only は charter の製品定義そのもの。検査可能な形=「実行前後で対象リポ全ファイルの
      ハッシュが不変」(深さ L3・許容差 exact)。ファイルメタデータ(atime)は対象外と明記する。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: L3, tolerance_hint: "対象リポ全ファイルの content hash 不変", approver_hint: automated }
    counterexamples:
      - 出力先の既定値がリポ内(bomdd/plm-output/ 等)になっていて事実上書き込む
      - ログファイルをカレントディレクトリ=リポルートに吐く
    unresolved_questions: []

  # ============================================================
  # B. 入力の発見とパース
  # ============================================================

  - id: REQ-003
    statement: >-
      ref-v0 ref-edges の artifacts[].file パターンに従い、bomdd/ 配下の成果物を発見し型付けする。
      パターン外のファイルは処理対象外とし、所見を出さない。
    rationale: >-
      発見規則はスキーマ(SRC-01)に既に列挙されており、それが唯一の典拠。深さ unit
      (既知構成のフィクスチャで発見結果の集合一致・許容差 exact)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "BomDD/method/schemas/draft/ref-edges.draft.yaml(ref-v0)"
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "発見ファイル集合の完全一致", approver_hint: automated }
    counterexamples:
      - 60-change-order-*.md の glob が 60-change-register.yaml を誤って掴む
      - ui/**/ui-ir.json が入れ子ディレクトリ(ui/image-tab/)で見つからない
    unresolved_questions: []

  - id: REQ-004
    statement: >-
      YAML/JSON の構文エラーはファイル単位の診断(severity=error、行・列・原因・修正ヒント付き)として
      報告し、残りのファイルの処理を継続する。いかなる入力でもプロセスはクラッシュしない。
    rationale: >-
      台帳は人間+AI が手で書き、SRC-05 の罠2件(alias 誤解釈・行末コロン)は恒常的に再発する。
      パーサ例外の生スタックトレースは読み物にならない。既知罠はパターン認識してヒントを付ける。
      深さ unit(壊れ入力コーパス全件で「診断が出て・継続して・exit 2 にならない」)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/plm-intake/yaml-authoring-traps.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "壊れ入力コーパス全件でクラッシュ0・診断1件以上・位置情報あり", approver_hint: automated }
    counterexamples:
      - BOM 付き UTF-8 で先頭キーの解釈がずれる
      - 空ファイル・ディレクトリだけ存在・シンボリックリンク循環
      - 巨大ファイル(数十MB の as-built)でメモリ枯渇
    unresolved_questions: []

  - id: REQ-005
    statement: >-
      未知のフィールドは無視し、所見を出さない(意味論を縛らない)。ref-v0 が型を規定するフィールド
      (id・*_refs 等)の型不一致のみ warn とする。スキーマと実物が衝突した場合の既定は「実物が正」。
    rationale: >-
      DEC-0001 の draft 規律。実リポはテンプレより先に進化する(SRC-04)。深さ unit
      (未知フィールド入りフィクスチャで所見ゼロ・既知フィールド型違いで warn 1件)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/65-decision-register.yaml, bomdd/plm-intake/id-inventory-2026-07-03.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: exact, approver_hint: automated }
    counterexamples:
      - typo フィールド(requirment_refs)が黙って無視され参照検査から漏れる — v0 は許容し、typo 検出は将来要求
    unresolved_questions:
      - question_id: UQ-REQ-005-001
        question: 既知フィールド名との編集距離が近い未知フィールド(typo 疑い)への info 通知を v0 に含めるか
        severity: non-blocker

  # ============================================================
  # C. ID 抽出と参照グラフ
  # ============================================================

  - id: REQ-006
    statement: >-
      ID 文法(37 families・family_pattern・厳格度)と参照エッジ定義は、ref-v0 の
      id-grammar.draft.yaml / ref-edges.draft.yaml を実行時入力として読み込む。
      文法・エッジをコードに焼き込まず、ref-v0 の改訂にコード変更なしで追随する。
    rationale: >-
      旧試作の失敗根因3=スキーマ進化をパーサのハードコードが追いかける地獄(SRC-02 前史)。
      スキーマをデータにすれば ref-v0 改訂は S-BOM の知識更新イベントになる。
      深さ unit(id-grammar の family を1件変えたコピーを与え、挙動が追随することを確認)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "スキーマ差し替えテストで再ビルドなしに挙動変化", approver_hint: automated }
    counterexamples:
      - family_pattern の正規表現方言差(PCRE vs JS RegExp)で挙動が変わる
      - スキーマ側の selector 記法拡張に実装が黙って未対応(→ 未対応 selector は error 診断にする)
    unresolved_questions: []

  - id: REQ-007
    rev: 2   # ECO-001(2026-07-03): パス受理形3種の明文化(PD-7/PD-8)
    statement: >-
      定義サイトから全 ID を抽出してファミリー別インデックスを作り、参照エッジの全参照を
      解決する。kind:path はパス実在、kind:id-or-path は ID 解決とパス実在の両様で判定する。
      パス値の受理形は3種(仕様 §2.4): 正準 `<repo>/<相対>` / repo 相対(セグメント数・file/dir 不問)/
      `repo名:相対`(正準と等価。rev3/ECO-002: repo 名が workspace に不在なら X-XREPO skip —
      ID 参照の cross_repo と同じ意味論。単一リポ実行を error で汚さない)。
    rationale: >-
      本製品の中核機能。正しさの基準はスキーマ(SRC-01)と実リポ(SRC-04)。
      深さ unit(合成フィクスチャで定義数・解決数・不解決数の完全一致)。
      rev2 根拠: S-19 裁定で repo 相対記法が実リポの常用と確定(実物が正)。旧実装は
      未規定次元を fallback で埋め、単一セグメント値のみ実在検査から漏れる非一貫を生んだ(PD-7 実測)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "BomDD/method/schemas/draft/(ref-v0.4)"
    priority: must
    source_refs: [bomdd/plm-intake/id-inventory-2026-07-03.md, bomdd/60-change-order-eco-001.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "期待インデックス・期待解決結果との完全一致", approver_hint: automated }
    counterexamples:
      - 散文(.md)からの ID 抽出で「E-BOM」等の文書名語を ID と誤認(SRC-04 で 132 件実在)
      - 同一 ID が2ファイルで定義(R-002 対象)なのに後勝ちで黙って上書き
      - M01(移行オラクル)を M-BOM family に誤分類
      - 単一セグメントの repo 相対値だけ実在検査せず不解決扱い(PD-7 — rev2 で是正)
      - repo: 形の repo 名不在時に形式2 へフォールバックして偽解決(rev2 の反例)
    unresolved_questions: []

  - id: REQ-008
    statement: >-
      品目(全ファミリー)・参照エッジ・lineage(supersedes 等)・lifecycle_state を含む
      参照グラフを機械可読 JSON として出力する。これが viewer への唯一の入力契約の一部となる。
    rationale: >-
      DEC-0002 の構成(core が生成・viewer が消費)。グラフ JSON があれば viewer 以外
      (将来の影響分析・メトリクス)も同じ出力を消費できる。深さ unit+L2
      (フィクスチャで期待グラフ一致・JSON スキーマ適合)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/65-decision-register.yaml]
    acceptance_intent: { depth_hint: L2, tolerance_hint: "グラフ JSON がスキーマ適合+期待値一致", approver_hint: automated }
    counterexamples:
      - ノード数万でファイルが肥大し viewer 読込が破綻(→ 規模上限は REQ-025 の計測対象)
    unresolved_questions: []

  - id: REQ-009
    statement: >-
      bomdd-workspace.yaml が供与された場合、複数リポ(ui-cad / manufacturing)を束ねて
      cross_repo 参照(ui-trace-map の ebomItemRef 等)を解決する。未供与時は cross_repo 参照を
      skip(info)とし error にしない。
    rationale: >-
      クロスリポ照合の不在が実害(IR 2系統分裂・UI-IR なし製造)を生んだ(SRC-02)。
      挙動は ref-v0 workspace 節に規定済み。深さ unit(2リポ合成フィクスチャで解決/skip の両分岐)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "BomDD/method/schemas/draft/ref-edges.draft.yaml#workspace"
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: exact, approver_hint: automated }
    counterexamples:
      - workspace 内の同名ファミリー ID 衝突(ui-cad と manufacturing 両方に E-XXX)の扱いが未規定
      - 相対パスの基準(workspace ファイル位置 vs 実行 cwd)の取り違え
    unresolved_questions:
      - question_id: UQ-REQ-009-001
        question: workspace 内リポ間で同一 family の ID が衝突した場合の規則(リポ修飾 or error)
        severity: non-blocker
      - question_id: UQ-REQ-009-002
        question: bomdd-workspace.yaml の置き場所の確定(charter UQ-003 の継承)
        severity: non-blocker

  # ============================================================
  # D. リント診断
  # ============================================================

  - id: REQ-010
    rev: 2   # ECO-002(2026-07-03): R-052 の v0 除外を解除(diff_audit opt-in+git fail-open で実装。仕様 §2.17)
    statement: >-
      ref-v0 リント規則 R-001〜R-052 の全規則を実装する。R-052(eco-diff-within-impact)は
      register の diff_audit フィールドを持つ ECO のみ検査し(opt-in)、git 実行不能時は
      X-GIT-001(info)で fail-open する(仕様 §2.17)。
      各所見は rule id・severity・ファイル・位置(行または selector)・対象 ID・メッセージを持つ。
    rationale: >-
      規則の正体・severity・ゲートは全て ref-v0 に規定済みで、本要求は「その忠実な実装」。
      深さ unit(規則ごとに違反フィクスチャ+クリーンフィクスチャの対で期待所見一致)。
      これが較正=製品オラクル(charter 完了定義)の実体。
    rationale_precision: ok
    classification_hint: surface
    external_source: "BomDD/method/schemas/draft/ref-edges.draft.yaml#lint_rules"
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "規則ごとの期待所見プロファイル完全一致(過検出も過少検出も FAIL)", approver_hint: automated }
    counterexamples:
      - R-040 で lineage.* 経由の参照を active 参照と誤認して false positive
      - R-020 で ui-trace-map が複数ある場合に片方しか見ない
      - R-010 で retired の REQ を未被覆と誤検出(lifecycle 考慮漏れ)
    unresolved_questions: []

  - id: REQ-011
    statement: >-
      severity は ref-v0 の規律に従う — strict family の壊れ参照=error、advisory family=最大 warn、
      per-edge 指定はエッジ定義に従う。実装側で severity を独自に上書きしない。
    rationale: >-
      DEC-0001(advisory 方針)の実装面。深さ unit(advisory 違反フィクスチャが warn で出ることの確認)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "BomDD/method/schemas/draft/id-grammar.draft.yaml(strictness)"
    priority: must
    source_refs: [bomdd/65-decision-register.yaml]
    acceptance_intent: { depth_hint: unit, tolerance_hint: exact, approver_hint: automated }
    counterexamples:
      - INV への壊れ参照を error にしてしまい実リポが赤だらけ(DEC-0001 違反)
    unresolved_questions: []

  - id: REQ-012
    statement: >-
      --gate {always|G1|G3|freeze|acceptance|eco} で適用規則集合を選ぶ。無指定=always のみ。
      ゲートは梯子として累積する(G3 指定=always+G1+G3)。eco のみ独立フラグとして加算する。
    rationale: >-
      draft 状態の BOM に完全性を要求しない(D1「重いから使わない」対策)。累積規則は
      「後のゲートは前のゲートを含む」という playbook の運用に一致。深さ unit(ゲートごとの
      適用規則集合の期待一致)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: unit, tolerance_hint: "ゲート×規則の適用マトリクス完全一致", approver_hint: automated }
    counterexamples:
      - freeze 指定で acceptance 規則まで走り、製造前リポが常に赤になる
    unresolved_questions: []

  - id: REQ-013
    statement: >-
      診断 JSON・グラフ JSON は同一入力に対しバイト同一とする(所見・ノードの安定ソート順と
      正規シリアライズ形式を仕様で固定する)。
    rationale: >-
      較正オラクル(期待所見プロファイル一致)と CI diff の前提。method-v1 §5 の L0 例外条項
      「仕様化された正規形は L0/exact 採用可」に該当する数少ないケース。
      深さ L3(同一リポに2回実行して byte diff ゼロ、ファイル列挙順を撹乱しても同一)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/plm-intake/00-index.md]
    acceptance_intent: { depth_hint: L3, tolerance_hint: "2回実行の出力 byte-diff = 0(タイムスタンプ等の可変要素を含まない)", approver_hint: automated }
    counterexamples:
      - 出力に実行時刻・絶対パス・ホスト名が混入して毎回変わる
      - OS のディレクトリ列挙順の差(Windows/Linux)で所見順が入れ替わる
      - 並列処理の完了順で順序が非決定になる
    unresolved_questions: []

  - id: REQ-014
    statement: >-
      CLI の exit code 契約 — 0=error 所見なし(warn/info は許容) / 1=error 所見あり /
      2=実行障害(入力不正・内部エラー)。--fail-on warn で warn も exit 1 に昇格できる。
    rationale: >-
      CI ゲートの配線仕様。warn を既定で fail にしない理由=advisory family(DEC-0001)が
      実リポで常在するため、既定 fail だと導入初日に全リポ赤で終わる。深さ L2
      (CLI 実行の exit code とレポートの突合)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/65-decision-register.yaml]
    acceptance_intent: { depth_hint: L2, tolerance_hint: exact, approver_hint: automated }
    counterexamples:
      - 構文エラー(REQ-004 の診断)を error 所見(exit 1)と実行障害(exit 2)のどちらに数えるかの取り違え — 規定は「診断として exit 1」
    unresolved_questions: []

  - id: REQ-015
    statement: >-
      設定ファイルで規則×対象(rule id + ID or path)の明示的抑制(suppress)を宣言できる。
      抑制には reason 必須。抑制された所見は消えず severity=info で出力に残る。
    rationale: >-
      draft 期間の運用=スキーマと実物の衝突を毎回裁定する(DEC-0001 consequences)。裁定までの間
      リントを回し続けるには抑制が要るが、黙った抑制はリントを無力化するため「理由必須+可視」。
      深さ unit(抑制設定ありフィクスチャで error→info 降格と reason 転記を確認)。
    rationale_precision: ok
    classification_hint: core
    priority: should
    source_refs: [bomdd/65-decision-register.yaml]
    acceptance_intent: { depth_hint: unit, tolerance_hint: exact, approver_hint: automated }
    counterexamples:
      - ワイルドカード抑制(rule:* )で全所見が info 化しリントが飾りになる(→ v0 はワイルドカード不許可)
      - reason が空文字で通る
    unresolved_questions: []

  # ============================================================
  # E. CLI と出力契約
  # ============================================================

  - id: REQ-016
    statement: >-
      CLI は引数で 対象(リポパス or workspace ファイル)・--gate・--format {json|text}・--out を受け、
      text 形式は要約(件数 by severity/rule)+所見一覧を stdout に出す。診断 JSON と分離した
      ログ・進捗は stderr に出す。--help を備える。
    rationale: >-
      Node CLI 慣習(stdout=データ / stderr=ログ)の転記。深さ L2(引数マトリクスの実行検査)。
    rationale_precision: ok
    classification_hint: surface
    external_source: "POSIX/Node CLI 慣習(K-BOM 候補: K-NODE-CLI)"
    priority: must
    source_refs: [bomdd/65-decision-register.yaml]
    acceptance_intent: { depth_hint: L2, tolerance_hint: "引数×挙動マトリクス全行 pass", approver_hint: automated }
    counterexamples:
      - 進捗表示が stdout に混ざり --format json がパース不能になる
      - Windows で日本語パス(ドキュメント等)・スペース入りパスが壊れる
    unresolved_questions: []

  - id: REQ-017
    statement: >-
      診断 JSON・グラフ JSON 自体のスキーマを versioned な成果物(JSON Schema)として本リポで管理し、
      出力にスキーマバージョンを埋め込む。後方非互換の変更はメジャー版上げとする。
    rationale: >-
      DEC-0002 consequences「診断 JSON が CLI/viewer 間の契約になる」の実装。viewer・CI・将来の
      消費者が依存する境界。深さ L2(出力が自スキーマに適合)。
    rationale_precision: ok
    classification_hint: core
    priority: must
    source_refs: [bomdd/65-decision-register.yaml]
