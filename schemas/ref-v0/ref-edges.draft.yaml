# BomDD Reference Edges (ref-v0, draft)
# 成果物ごとの「ID をどこで定義し、どのフィールドがどのファミリーを参照するか」の台帳。
# セレクタ記法: ドット区切り+配列は []。リンタはこのセレクタで YAML/JSON を辿る。
# severity は「参照先が解決できない時」の既定(ファミリーの strictness を上書きしない: advisory 先は最大 warn)。
#
# 意味論は縛らない: ここに無いフィールドは自由。ここに有るフィールドも「型と参照先ファミリー」だけを縛る。

edges_version: ref-v0.4
# ref-v0.4(2026-07-03・BomDD-Plm ECO-001 と同時): S-19 裁定で保留した2系統の正式化 —
#   (a) パス値の受理形を kind 凡例に明文化(正準 / repo 相対 / `repo名:相対`。PD-7/PD-8 =
#       実装が未規定次元で非一貫化した実測に基づく。「実物が正」: 実リポ台帳は repo 相対を常用)
#   (b) uniqueness_scope: per-file を定義サイト宣言に導入(ui-ir の tempPartNo/uiId に適用)。
#       ViewPrism2 は画面別 ui-ir(3ファイル)で仮品番を各々 0001 から採番しており、workspace 全域 R-002 が誤発火する。
# ref-v0.3(2026-07-03): S-19 実リポ遡及の裁定ループで確定した補正(実物が正の初適用群) —
#   (a) TMP-UI-LIV を ui-bom/ui-trace-map の family 列挙に追加 (b) FMEA の定義サイト(33 fmea[].id)を追加
#   (c) ui-id family に domain.* を追加(ViewPrism2 実 IR の慣行) (d) 31-kbom の直下リスト構造を許容
# ref-v0.2(2026-07-03): BomDD-Plm 初回製造(2工場)の差分帰属で確定した補正 —
#   (a) 専用規則エッジの rule/gate 上書き(affected_refs=R-051/eco。R-003 二重計上の排他)
#   (b) candidate 定義の fallback 意味論(正定義不在時のみ索引登録。60-*.md を candidate 化)
# ref-v0.1(2026-07-03): BomDD-Plm G3 ドライランで検出された欠陥の補正 —
#   (a) kind 語彙の凡例を明文化 (b) trace_id の分散定義を distributed_defines へ正規化
#   (c) 台帳3成果物(51/60-register/65)を artifacts に追加 (d) 60-*.md の散文抽出エッジを廃止
#   (R-051 は 60-change-register.yaml の構造化フィールドで検査。register 不在= skip/info)

# kind 凡例(参照エッジの種別):
#   (無指定)   = ID 参照。対象 family の索引で解決
#   path       = リポ内パス。存在検査
#   id-or-path = ①ID として解決 → ②パスとして存在 → 両失敗で不解決
#   path-at-rev= `パス@rev` 形式。パス部のみ存在検査(@rev は無視)
#   none(severity: none) = 解決検査しない(表示・記録用)
#
# パス値の受理形(ref-v0.4。kind: path / id-or-path の②/ path-at-rev のパス部に共通):
#   1. 正準形      `<repo名>/<リポ内相対>`   — 出力・ソート・suppress 照合はこの形(製品仕様 INV-004)
#   2. repo 相対形  `<リポ内相対>`(repo 名なし)— workspace 内のいずれかの repo からの相対で実在すれば解決。
#                   セグメント数を問わない(単一セグメント `test` も可)。file / dir を問わない
#   3. repo: 形     `<repo名>:<リポ内相対>`   — 正準形と等価(実リポの cross-repo 慣行)。repo 名不在なら不解決
#   `パス#断片` は断片を無視。受理形は解決(受理)の規定であり、出力の正準化(1 の形)を変えない

# 定義サイト宣言の追加キー(ref-v0.4):
#   uniqueness_scope: per-file — この定義サイト由来の ID の R-002 一意性検査を「抽出ファイル単位」で行う
#   (同一ファイル内の重複のみ R-002。別ファイル間の同名は合法)。無指定= workspace 全域(従来どおり)。
#   ID 索引(参照解決)への登録は従来どおり全域=索引に存在すれば解決(per-file は R-002 の重複判定スコープのみを変える)

distributed_defines:      # 全成果物に分散して現れる定義サイト
  - selector: "**.trace_links[].trace_id"
    family: TL

artifacts:
  - file: bomdd/10-requirements.yaml
    defines:
      - selector: requirements[].id
        family: REQ
    refs:
      - selector: requirements[].source_refs[]
        kind: path            # リポ内パス。R-004 で存在検査
      - selector: requirements[].trace_links[].(from|to)
        kind: id-or-path      # 任意ファミリー ID または パス#断片

  - file: bomdd/30-ebom.yaml
    defines:
      - selector: ebom.items[].id
        family: E
      - selector: ebom.display_contracts[].contract_id
        family: DC
      - selector: ebom.display_contracts[].elements[].element_id
        family: DE
    refs:
      - { selector: "ebom.items[].requirement_refs[]",        family: REQ, severity: error }
      - { selector: "ebom.items[].kbom_refs[]",               family: K,   severity: error }
      - { selector: "ebom.items[].depends_on[]",              family: E,   severity: error }
      - { selector: "ebom.items[].acceptance_refs[]",         family: CP,  severity: error }
      - { selector: "ebom.items[].display_contract_refs[]",   family: [DC, DE], severity: error }
      - { selector: "ebom.items[].design_system_refs[]",      family: [E, K],   severity: error }
      - { selector: "ebom.items[].graph_edges.owner",         family: E,   severity: error }
      - { selector: "ebom.items[].graph_edges.consumers[]",   family: E,   severity: error }
      - { selector: "ebom.items[].lineage.supersedes[]",      family: E,   severity: error }
      - { selector: "ebom.items[].lineage.superseded_by[]",   family: E,   severity: error }
      - { selector: "ebom.items[].lineage.split_by[]",        family: E,   severity: error }
      - { selector: "ebom.items[].lineage.change_ref",        family: [ECO, CAPA], severity: warn }
      - { selector: "ebom.items[].external_source_ref",       kind: id-or-path, family: [K], severity: warn }
      - { selector: "ebom.items[].planned_output_artifact_ref", kind: path, severity: warn }
      - { selector: "ebom.display_contracts[].elements[].requirement_refs[]", family: REQ, severity: error }
      - { selector: "ebom.display_contracts[].elements[].ebom_item_ref",      family: E,   severity: error }
      - { selector: "ebom.display_contracts[].elements[].acceptance_ref",     family: CP,  severity: error }
      - { selector: "ebom.ui_sources[].(ui_ir_ref|ui_bom_ref|ui_trace_map_ref|extraction_report_ref|design_system_bom_ref)", kind: path, severity: error }

  - file: bomdd/31-kbom.yaml
    defines:
      - selector: kbom.items[].id
        family: K
      - selector: kbom[].id
        family: K
        note: "ref-v0.3(S-19 裁定): ViewPrism2 実物は kbom: 直下リスト構造。両セレクタを試行(実物が正)"
    refs:
      - { selector: "kbom.items[].consumers[]",       family: [E, M], severity: error }
      - { selector: "kbom.items[].depends_on[]",      family: K,      severity: error }
      - { selector: "kbom.items[].acceptance_refs[]", family: CP,     severity: warn }
      - { selector: "kbom.items[].source",            kind: id-or-path, severity: none }

  - file: bomdd/32-mbom.yaml
    defines:
      - selector: mbom.manufacturing_units[].id
        family: M
    refs:
      - { selector: "mbom.manufacturing_units[].ebom_refs[]",       family: E,     severity: error }
      - { selector: "mbom.manufacturing_units[].kbom_refs[]",       family: K,     severity: error }
      - { selector: "mbom.manufacturing_units[].acceptance_refs[]", family: CP,    severity: error }
      - { selector: "mbom.manufacturing_units[].fmea_refs[]",       family: FMEA,  severity: warn }
      - { selector: "mbom.manufacturing_units[].depends_on[]",      family: M,     severity: error }
      - { selector: "mbom.manufacturing_units[].routing_refs[]",    family: [ROUTE, ROUTING], severity: warn }
      - { selector: "mbom.manufacturing_units[].display_contract.refs[]",              family: DC, severity: error }
      - { selector: "mbom.manufacturing_units[].display_contract.required_elements[]", family: DE, severity: error }
      - { selector: "mbom.manufacturing_units[].artifact.path", kind: path, severity: warn }

  - file: bomdd/33-control-plan.yaml
    defines:
      - selector: control_plan.characteristics[].id
        family: CP
      - selector: control_plan.fmea[].id
        family: FMEA
        note: "ref-v0.3(S-19 裁定): FMEA の機械可読な定義サイト。id-grammar の FMEA は advisory のまま(構造が題材間で揺れるため。本 selector に合致しない題材では従来どおり散文扱い)"
    refs:
      - { selector: "control_plan.characteristics[].verifies[]",         family: [E, M], severity: error }
      - { selector: "control_plan.characteristics[].requirement_refs[]", family: REQ,    severity: error }
      - { selector: "control_plan.characteristics[].fixture",            kind: path,     severity: warn }

  - file: bomdd/34-routing.yaml
    defines:
      - selector: routing.id
        family: ROUTING
      - selector: routing.steps[].id
        family: ROUTE
    refs:
      - { selector: "routing.steps[].consumes_refs[]",   family: [M, K], severity: error }
      - { selector: "routing.steps[].acceptance_refs[]", family: CP,     severity: error }
      - { selector: "routing.steps[].produces_refs[]",   kind: path,     severity: none }

  - file: bomdd/35-design-system-bom.yaml
    defines:
      - selector: design_system_bom.ebom_surface_parts[].id
        family: E
        candidate: true
        note: >-
          候補定義(ref-v0.2 で fallback 意味論に更新): candidate:true の定義サイトは R-002 一意性の
          対象外。正定義が存在しない ID に限り fallback として索引に登録する(解決に使える)。
          R-021 が 30 との同期を検査する。G3 第2回(30/35 二重定義)と初回製造 S-16(ECO 二重定義)の補正。
    refs:
      - { selector: "design_system_bom.root.ebom_item_ref",  family: E, severity: warn }
      - { selector: "design_system_bom.root.kbom_pack_ref",  family: K, severity: warn }
      - { selector: "design_system_bom.source_cad_refs.*",   kind: path, severity: warn }

  - file: bomdd/41-fixed-oracle.yaml
    defines:
      - selector: fixed_oracle.cases[].id
        family: S
      - selector: fixed_oracle.equivalence_rules[].id
        family: EQ
    refs:
      - { selector: "fixed_oracle.cases[].equivalence_ref",         family: EQ,       severity: error }
      - { selector: "fixed_oracle.cases[].spec_ref",                kind: id-or-path, severity: error, note: "凍結ゲートでは必須(R-030): 期待値の典拠なきオラクル行は仕様の穴" }
      - { selector: "fixed_oracle.cases[].display_contract_refs[]", family: [DC, DE], severity: error }

  - file: bomdd/42-exploratory-probes.yaml
    defines:
      - selector: exploratory_probes[].id
        family: P
    refs:
      - { selector: "exploratory_probes[].sweep_ref", kind: id-or-path, severity: warn }

  - file: bomdd/50-as-built.yaml
    defines:
      - selector: as_built[].id
        family: AB
      - selector: as_built[].test_evidence_refs[].evidence_id
        family: TE
    refs:
      - { selector: "as_built[].(work_order_ref|mbom_ref|routing_ref|control_plan_ref)", kind: path-at-rev, severity: warn }
      - { selector: "as_built[].test_evidence_refs[].cp_ref",       family: CP,    severity: error }
      - { selector: "as_built[].test_evidence_refs[].evidence_path", kind: path,   severity: warn }
      - { selector: "as_built[].cheats[]",                          family: CHEAT, severity: warn }
      - { selector: "as_built[].artifacts_sha256[].path",           kind: path,    severity: warn }

  - file: bomdd/53-service-bom.yaml
    defines:
      - selector: service_bom.items[].id
        family: SB
    refs:
      - { selector: "service_bom.items[].part_ref",                    family: E,  severity: error }
      - { selector: "service_bom.items[].external_deps[].kbom_ref",    family: K,  severity: error }
      - { selector: "service_bom.items[].as_built_ref",                family: AB, severity: error }
      - { selector: "service_bom.items[].reinspect_on_change[].cp_ref", family: CP, severity: error }

  - file: "bomdd/60-change-order-*.md"
    defines:
      - selector: "filename"          # 60-change-order-eco-025.md → ECO-025
        family: [ECO, CAPA]
        candidate: true
        note: "ref-v0.2: register(60-change-register.yaml)と同一実体の別記録につき candidate 化(R-002 対象外)。register 不在時は fallback として索引に入る。"
    refs: []
    note: "散文本文からの ID 抽出はしない(ref-v0.1 で散文エッジ廃止 — 誤検出132件の実測+G3 Q4)。影響分析の機械検査(R-051)は 60-change-register.yaml の構造化フィールドで行う。"

  - file: "bomdd/60-change-register.yaml"
    defines:
      - selector: "changes[].id"
        family: [ECO, CAPA]
    refs:
      - { selector: "changes[].affected_refs[]", family: [REQ, E, M, K, CP, DC, DE], severity: error, rule: R-051, gate: eco, note: "ref-v0.2: 専用規則エッジ — 不解決は R-051(gate=eco)でのみ所見化し、汎用 R-003(always)から除外する(初回製造で2工場とも二重計上に落ちた欠陥の補正)。register 不在のプロジェクトでは R-051 = skip(info)" }
      - { selector: "changes[].order_ref",       kind: path, severity: warn, note: "対応する 60-change-order-*.md" }

  - file: "bomdd/51-cheat-log.md"
    defines:
      - selector: "headings"          # `#`〜`###` 見出し行の最初の family ID トークン(CHEAT)
        family: CHEAT
    refs: []
    note: "advisory family。見出し抽出のみ(本文は読まない)。台帳ビューの表示ソース。"

  - file: "bomdd/65-decision-register.yaml"
    defines:
      - selector: "decisions[].id"
        family: DEC
    refs:
      - { selector: "decisions[].binds[]",         severity: none, note: "記録用(reserved family 運用中につき解決検査しない)" }
      - { selector: "decisions[].superseded_by",   family: DEC, severity: warn }

  # ---- UI-CAD 層(JSON) ----
  - file: "bomdd/ui/**/ui-ir.json"
    defines:
      - selector: "(screens|regions|components|occurrences|actions|inputs|states|domainConcepts|layoutInvariants)[].tempPartNo"
        family: [TMP-UI-SCR, TMP-UI-REG, TMP-UI-CMP, TMP-UI-OCC, TMP-UI-ACT, TMP-UI-INP, TMP-UI-STA, TMP-UI-DOM, TMP-UI-LIV]
        uniqueness_scope: per-file   # ref-v0.4: 画面別 IR は各ファイルで独立採番(ViewPrism2 実態が正)
      - selector: "*[].uiId"
        family: ui-id
        uniqueness_scope: per-file   # ref-v0.4: 同上
    refs:
      - { selector: "meta.sources[].file", kind: path, severity: error, note: "モック HTML への参照。CAD の正本" }
      - { selector: "regions[].screen",    family: TMP-UI-SCR, severity: error }

  - file: "bomdd/ui/**/ui-bom.json"
    refs:
      - { selector: "items[].tempPartNo", family: [TMP-UI-SCR, TMP-UI-REG, TMP-UI-CMP, TMP-UI-OCC, TMP-UI-ACT, TMP-UI-INP, TMP-UI-STA, TMP-UI-DOM, TMP-UI-LIV], severity: error, note: "UI-BOM は UI-IR の昇格 — 新規採番せず IR の仮品番を引き継ぐ。TMP-UI-LIV は ref-v0.3 で追加(S-19 裁定: layoutInvariant の昇格が解決不能になっていた)" }

  - file: "bomdd/ui/**/ui-trace-map.json"
    refs:
      - { selector: "entries[].uiIr",        family: [TMP-UI-SCR, TMP-UI-REG, TMP-UI-CMP, TMP-UI-OCC, TMP-UI-ACT, TMP-UI-INP, TMP-UI-STA, TMP-UI-DOM, TMP-UI-LIV], severity: error }
      - { selector: "entries[].uiBom",       family: [TMP-UI-SCR, TMP-UI-REG, TMP-UI-CMP, TMP-UI-OCC, TMP-UI-ACT, TMP-UI-INP, TMP-UI-STA, TMP-UI-DOM, TMP-UI-LIV], severity: error }
      - { selector: "entries[].ebomItemRef[]", family: E, severity: error, cross_repo: true, note: "UI-CAD リポ → 製造リポの越境参照。workspace 設定で解決" }

# ---- クロスリポ解決 ----
workspace:
  file: bomdd-workspace.yaml           # 任意。プロジェクトルートまたはリンタ引数で供与
  shape:
    repos:
      - name: <論理名 例 ui-cad>
        path: <リポのルートパス>
        role: ui-cad | manufacturing | method
  resolution: "cross_repo: true の参照は、workspace 内の他リポの定義サイトも探索して解決する。"
  note: workspace 未供与の場合、cross_repo 参照は skip(info)とし error にしない。

# ---- リントルール台帳 ----
# gate: always(常時) / G1(要求確定) / G3(BOM ドライラン=製造前) / freeze(オラクル凍結前) /
#       acceptance(受入時) / eco(変更オーダー時)
lint_rules:
  - id: R-001
    name: id-well-formed
    rule: 全定義サイトの ID が id-grammar の family_pattern に適合する
    gate: always
    severity: error
  - id: R-002
    name: id-unique
    rule: 同一ファミリーの ID がプロジェクト(+workspace)内で一意
    gate: always
    severity: error
  - id: R-003
    name: ref-resolves
    rule: 全参照エッジの ID が定義サイトに解決できる(strict=error / advisory=warn)
    gate: always
    severity: per-family
  - id: R-004
    name: path-exists
    rule: kind:path の参照先ファイルが存在する
    gate: always
    severity: per-edge
  - id: R-005
    name: no-orphan-definition
    rule: 定義された ID のうち、どこからも参照されないものを報告(削除でなく可視化)
    gate: always
    severity: info
    note: >-
      記録系 family(TL/UQ/DEC/CHEAT/GF)は対象外(性質上被参照を持たない)。
      lineage.* 経由の参照も被参照に数える。(BomDD-Plm オラクル実装時に確定・2026-07-03)

  - id: R-010
    name: req-covered-by-ebom
    rule: 全 REQ が ≥1 の E 品目の requirement_refs から参照される
    gate: G3
    severity: error
  - id: R-011
    name: ebom-has-acceptance
    rule: lifecycle_state が manufacturing-ready の E 品目は acceptance_refs ≥1
    gate: G3
    severity: error
  - id: R-012
    name: ebom-realized-by-mbom
    rule: manufacturing-ready の E 品目は ≥1 の M unit の ebom_refs から参照される
    gate: G3
    severity: error
  - id: R-013
    name: core-surface-origin
    rule: classification:core は requirement_refs ≥1 / surface は external_source_ref または kbom_refs ≥1
    gate: G3
    severity: error
    note: FINDINGS §4 の E-BOM 規則1の参照層表現
  - id: R-014
    name: cp-has-test-vectors
    rule: depth が unit/L2/L3 の CP 行は test_vectors ≥1(CHEAT-005 対策)
    gate: freeze
    severity: warn

  - id: R-020
    name: ui-surface-has-cad
    rule: >
      display_contract_refs または design_system_refs を持つ(=UI surface の)E 品目は、
      workspace 内のいずれかの ui-trace-map.json の entries[].ebomItemRef から参照されている。
      CAD(UI-IR)なしの UI surface は routing に入れない。
    gate: G3
    severity: error
    note: ViewPrismUI 画像ビューアー事故(ECO-022 CAPA)の予防ゲート。遡及監査を常設ゲート化したもの。
  - id: R-021
    name: design-system-sync
    rule: 35-design-system-bom の ebom_surface_parts[].id が 30-ebom.items にも存在する(coverage_status が理由付き out-of-scope の場合を除く)
    gate: G3
    severity: error

  - id: R-030
    name: oracle-case-has-spec-ref
    rule: 固定オラクル全ケースが spec_ref を持つ(期待値の典拠なき行=仕様の穴)
    gate: freeze
    severity: error
  - id: R-031
    name: oracle-frozen-marker
    rule: fixed_oracle.frozen_since と self_test が記入済み
    gate: freeze
    severity: error

  - id: R-040
    name: active-graph-integrity
    rule: >
      lifecycle_state が superseded/retired の品目を、active な参照
      (depends_on / ebom_refs / verifies / consumers / acceptance_refs 等。lineage.* は除く)
      が指していない
    gate: always
    severity: error
    note: テンプレ64(part-lineage-reattribution)の機械検査版。
  - id: R-041
    name: trace-link-endpoints
    rule: trace_links[].from/to が ID または実在パスに解決できる
    gate: always
    severity: warn

  - id: R-050
    name: acceptance-evidence-coverage
    rule: 最新 AB エントリの test_evidence_refs が、対象 M unit の acceptance_refs の CP 行を全て被覆する
    gate: acceptance
    severity: error
  - id: R-051
    name: eco-impact-ids-resolve
